<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Mustapha Baroudi — Industrial Engineer, Data and Supply Chain">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c121c"/>
      <stop offset="1" stop-color="#0a0f18"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6a23c" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#e6a23c" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.28" r="0.5">
      <stop offset="0" stop-color="#e6a23c" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#e6a23c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1a2536" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- accent bar -->
  <rect x="72" y="96" width="6" height="112" rx="3" fill="#e6a23c"/>

  <!-- name -->
  <text x="98" y="132" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="56" font-weight="700" fill="#f2f6fb" letter-spacing="-1.5">Mustapha Baroudi</text>
  <!-- tagline -->
  <text x="100" y="172" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="23" font-weight="500" fill="#9aa6b8">Industrial Engineer &#183; Data &#215; Supply Chain</text>
  <!-- mono microcopy -->
  <text x="100" y="206" font-family="'SF Mono',ui-monospace,'Cascadia Code',Consolas,monospace" font-size="15" fill="#e6a23c">// building AI &amp; data systems for operations &amp; supply chain</text>

  <!-- meta chips -->
  <g font-family="'SF Mono',ui-monospace,Consolas,monospace" font-size="13" fill="#7f8da0">
    <text x="100" y="250" fill="#7f8da0">ESITH</text>
    <text x="152" y="250" fill="#e6a23c">&#8594;</text>
    <text x="170" y="250" fill="#7f8da0">ENSAIT</text>
    <text x="238" y="250" fill="#3a4658">&#183;</text>
    <text x="252" y="250" fill="#7f8da0">Casablanca</text>
    <text x="352" y="250" fill="#e6a23c">&#8646;</text>
    <text x="372" y="250" fill="#7f8da0">France</text>
  </g>

  <!-- trajectory motif -->
  <g transform="translate(0,0)">
    <path d="M770 250 L820 218 L880 228 L940 182 L1000 158 L1060 122 L1120 84 L1120 250 Z" fill="url(#area)"/>
    <polyline points="770,250 820,218 880,228 940,182 1000,158 1060,122 1120,84"
      fill="none" stroke="#e6a23c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
      stroke-dasharray="620" stroke-dashoffset="0">
      <animate attributeName="stroke-dashoffset" from="620" to="0" dur="1.6s" fill="freeze"/>
    </polyline>
    <g fill="#0a0f18" stroke="#e6a23c" stroke-width="2.5">
      <circle cx="820" cy="218" r="4"/><circle cx="880" cy="228" r="4"/><circle cx="940" cy="182" r="4"/>
      <circle cx="1000" cy="158" r="4"/><circle cx="1060" cy="122" r="4"/>
    </g>
    <circle cx="1120" cy="84" r="6" fill="#e6a23c">
      <animate attributeName="r" values="6;9;6" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.55;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
